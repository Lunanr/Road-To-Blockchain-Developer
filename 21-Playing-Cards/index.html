<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Cards</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main id="playing-cards">
        <div class="card">
            <div class="left">
                <span>A</span>
                <span>♠</span>
            </div>
            <div class="middle">
                <span>♠</span>
            </div>
            <div class="right">
                <span class="flipped">♠</span>
                <span class="flipped">A</span>
            </div>
        </div>
        <div class="card">
            <div class="left">
                <span>2</span>
                <span>♣</span>
            </div>
            <div class="middle">
                <span>♣</span>
                <span class="flipped">♣</span>
            </div>
            <div class="right">
                <span class="flipped">♣</span>
                <span class="flipped">2</span>
            </div>
        </div>
        <div class="card red">
            <div class="left">
                <span>3</span>
                <span>♥</span>
            </div>
            <div class="middle">
                <span>♥</span>
                <span>♥</span>
                <span class="flipped">♥</span>
            </div>
            <div class="right">
                <span class="flipped">♥</span>
                <span class="flipped">3</span>
            </div>
        </div>
        <div class="card">
            <div class="left">
                <span>4</span>
                <span>♣</span>
            </div>
            <div class="middle">
                <div class="middle-section">
                    <span>♣</span>
                    <span>♣</span>
                </div>
                <div class="middle-section">
                    <span class="flipped">♣</span>
                    <span class="flipped">♣</span>
                </div>
            </div>
            <div class="right">
                <span class="flipped">♣</span>
                <span class="flipped">4</span>
            </div>
        </div>
        <div class="card red">
            <div class="left">
                <span>5</span>
                <span>♦</span>
            </div>
            <div class="middle">
                <div class="middle-section">
                    <span>♦</span>
                    <span>♦</span>
                </div>
                <div class="middle-section">
                    <span>♦</span>
                </div>
                <div class="middle-section">
                    <span>♦</span>
                    <span>♦</span>
                </div>
            </div>
            <div class="right">
                <span class="flipped">♦</span>
                <span class="flipped">5</span>
            </div>
        </div>
    </main>
</body>
</html>
